<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>AI Araç Değerleme V2.2</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0f1219;
            --bg-card: #181d28;
            --bg-input: #222938;
            --border-color: #2e3748;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --primary: #00c896;
            
            /* Ekspertiz Durum Renkleri */
            --color-orijinal: #27ae60;
            --color-lokal: #2980b9;
            --color-boya: #f1c40f;
            --color-soktak: #e67e22;
            --color-degisen: #e74c3c;
            --color-islemli: #111111;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 12px; display: flex; justify-content: center; }
        .phone-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 60px; }
        h1.main-title { text-align: center; font-size: 20px; font-weight: 800; margin: 10px 0; }
        
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 16px; }
        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 11px; font-weight: 600; color: var(--text-muted); }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-input); color: #fff; font-size: 13px; font-weight: 600; outline: none; }

        /* ARABA ŞEMASI */
        .car-layout { display: flex; flex-direction: column; align-items: center; gap: 4px; max-width: 300px; margin: 15px auto; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 24px; border: 1px dashed rgba(255,255,255,0.1); }
        .car-row { display: flex; justify-content: center; gap: 4px; width: 100%; }
        
        .part { 
            background: var(--color-orijinal); border-radius: 6px; padding: 6px 2px; text-align: center; 
            color: #fff; cursor: pointer; user-select: none; transition: background 0.2s; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50px; 
        }
        .part-name { font-size: 10px; font-weight: 800; line-height: 1.1; }
        .part-status { font-size: 8px; font-weight: 600; background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 4px; margin-top: 4px; }
        
        .w-mid { width: 80px; } .w-side { width: 75px; } .w-full { width: 234px; }
        .empty-space { background: transparent !important; cursor: default; }
