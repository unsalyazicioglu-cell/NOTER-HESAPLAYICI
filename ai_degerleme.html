<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Araç Değerleme V2</title>
<style>
body{margin:0;background:#0f1117;color:#fff;font-family:Arial}
.container{max-width:900px;margin:auto;padding:15px}
.card{background:#1b2230;border-radius:16px;padding:15px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
input,select,button{width:100%;padding:12px;border-radius:10px;border:none}
.car{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.part{background:#27ae60;padding:12px;border-radius:10px;text-align:center;cursor:pointer}
.loading,.result{display:none}
.actions button{margin-top:8px}
</style>
</head>
<body>
<div class="container">
<h1>🤖 AI Araç Değerleme V2</h1>

<div class="card">
<div class="grid">
<input placeholder="Marka">
<input placeholder="Model">
<input placeholder="Paket">
<input placeholder="İl">
<input placeholder="KM">
<input placeholder="Tramer">
</div>
</div>

<div class="card">
<h3>🚗 Kaporta Şeması</h3>
<div class="car">
<div class="part">Sol Ön Çamurluk</div>
<div class="part">Kaput</div>
<div class="part">Sağ Ön Çamurluk</div>
<div class="part">Sol Ön Kapı</div>
<div class="part">Tavan</div>
<div class="part">Sağ Ön Kapı</div>
<div class="part">Sol Arka Kapı</div>
<div class="part">Bagaj</div>
<div class="part">Sağ Arka Kapı</div>
</div>
</div>

<div class="card">
<h3>🏗️ Kritik Noktalar</h3>
<div class="grid">
<select><option>Şase Yok</option><option>Şase Var</option></select>
<select><option>Bagaj Havuzu Yok</option><option>Bagaj Havuzu Var</option></select>
<select><option>Ön Podye Yok</option><option>Ön Podye Var</option></select>
<select><option>Arka Podye Yok</option><option>Arka Podye Var</option></select>
</div>
</div>

<button onclick="startAI()">🤖 AI DEĞERLEME YAP</button>

<div id="loading" class="card loading">
<h3>⏳ AI Analiz Ediyor</h3>
<div id="percent">0%</div>
</div>

<div id="result" class="card result">
<h3>📊 Sonuç</h3>
<p>Minimum Değer: --</p>
<p>Ortalama Değer: --</p>
<p>Maksimum Değer: --</p>
<div class="actions">
<button onclick="copyResult()">📋 Sonucu Kopyala</button>
<button onclick="shareWhatsApp()">📲 WhatsApp Paylaş</button>
</div>
</div>

</div>
<script>
function startAI(){
document.getElementById('loading').style.display='block';
let p=0;
let t=setInterval(()=>{
p+=5;
document.getElementById('percent').innerText=p+'%';
if(p>=100){
clearInterval(t);
document.getElementById('loading').style.display='none';
document.getElementById('result').style.display='block';
}
},120);
}
function copyResult(){
navigator.clipboard.writeText('AI Araç Değerleme Sonucu');
alert('Kopyalandı');
}
function shareWhatsApp(){
window.open('https://wa.me/?text='+encodeURIComponent('AI Araç Değerleme Sonucu'));
}
</script>
</body>
</html>
